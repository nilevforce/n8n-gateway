version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: n8n-gateway-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: .
    container_name: n8n-gateway
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - N8N_URL=${N8N_URL}
      - REDIS_URL=redis://redis:6379
      - CONCURRENCY=${CONCURRENCY}
      - PORT=8000
      - LOG_LEVEL=info
      - LOG_DIR=/app/logs
    volumes:
      - n8n_gateway_logs:/app/logs
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  n8n_gateway_logs:
